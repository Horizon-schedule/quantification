# StopQuant 宿主机 Nginx 配置示例
#
# 适用场景：ECS 上已有 Nginx（如 apiself.online / bookkeeping.apiself.online），
# StopQuant 仅以 Docker 运行 Gunicorn，监听 127.0.0.1:8000，由宿主机 Nginx 反代。
#
# 使用步骤：
# 1. .env 中设置 APP_BIND_PORT=8000（默认），docker compose up -d
# 2. 域名 quant.apiself.online 解析到 ECS 公网 IP
# 3. 将下方 HTTPS 段追加到 /etc/nginx/sites-enabled/ 现有配置
# 4. 在 HTTP 80 的 server_name 中增加 quant.apiself.online
# 5. nginx -t && systemctl reload nginx
# 6. certbot certonly --nginx -d quant.apiself.online（若证书未覆盖该子域）

# ---------- 修改现有 HTTP 跳转块（示例）----------
# server {
#     listen 80;
#     listen [::]:80;
#     server_name apiself.online bookkeeping.apiself.online quant.apiself.online;
#     ...
# }

# ---------- 新增 StopQuant HTTPS 反代 ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quant.apiself.online;

    ssl_certificate /etc/letsencrypt/live/apiself.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apiself.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# 端口对照（宿主机 Nginx 已有服务，StopQuant 不要占用 80/443）：
#   apiself.online              -> 127.0.0.1:3000
#   bookkeeping.apiself.online    -> 127.0.0.1:8080
#   quant.apiself.online          -> 127.0.0.1:8000  （StopQuant）
