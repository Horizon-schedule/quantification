services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stopquant-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "${APP_BIND_PORT:-8000}:8000"
    volumes:
      - app_logs:/app/logs
      - app_output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app_logs:
  app_output:
